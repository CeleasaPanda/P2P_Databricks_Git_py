job:
  name: cp_job

  tasks:
    - task_key: ingest_task
      notebook_task:
        notebook_path: /Workspace/Users/celeasa@prisoft.com/databricks_github_demo/Ingestion Notebook for Git

        base_parameters:
          primary_keys: id
          timestamp_column: updated_at

    - task_key: transform_task
      depends_on:
        - task_key: ingest_task

      notebook_task:
        notebook_path: /Workspace/Users/celeasa@prisoft.com/databricks_github_demo/Transformation Notebook For Git

        base_parameters:
          primary_keys: id
          timestamp_column: updated_at
